<head>

  <meta name="color-scheme" content="light">
  <meta name="description" content="三創卓越之星互動圖片頁面">
  <title>三創卓越之星</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f4f7fb;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-width: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(12px, 3vw, 36px);
      background:
        radial-gradient(circle at top, rgba(34, 107, 178, 0.08), transparent 42%),
        #f4f7fb;
    }

    main {
      width: 100%;
      display: grid;
      place-items: center;
    }

    .image-link {
      display: block;
      width: fit-content;
      max-width: min(100%, 960px);
      border-radius: 16px;
      outline: none;
      box-shadow: 0 12px 32px rgba(21, 55, 96, 0.14);
      transition: transform 160ms ease, box-shadow 160ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .image-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 38px rgba(21, 55, 96, 0.2);
    }

    .image-link:focus-visible {
      outline: 4px solid rgba(0, 113, 188, 0.45);
      outline-offset: 5px;
    }

    img {
      display: block;
      max-width: 100%;
      width: auto;
      height: auto;
      border: 0;
      border-radius: inherit;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .image-link {
        border-radius: 10px;
        box-shadow: 0 8px 22px rgba(21, 55, 96, 0.14);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .image-link {
        transition: none;
      }

      .image-link:hover {
        transform: none;
      }
    }
  </style>
